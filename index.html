<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Café Cult</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="https://img.icons8.com/emoji/512/hot-beverage.png">
  
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  
  <style>
    /* ✨ PREMIUM NATIVE APP ARCHITECTURE ✨ */
    :root {
      --sat: env(safe-area-inset-top);
      --sab: env(safe-area-inset-bottom);
    }

    /* 1. Completely lock the viewport so it never bounces */
    html, body {
      height: 100dvh;
      width: 100vw;
      overflow: hidden;
      position: fixed;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }

    /* 2. Only allow specific internal containers to scroll */
    .ios-scroll {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior-y: contain;
    }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-50 font-sans flex flex-col antialiased selection:bg-zinc-800">

  <!-- ==================== SCREEN 1: LOGIN ==================== -->
  <div id="auth-screen" class="flex-1 flex flex-col justify-center px-8 h-full w-full">
    <div class="max-w-sm w-full mx-auto space-y-8 text-center -mt-10">
      <div class="space-y-3">
        <div class="text-5xl animate-bounce">☕</div>
        <h1 class="text-4xl font-black tracking-tight text-transparent bg-clip-text bg-gradient-to-b from-zinc-50 to-zinc-400">CAFÉ CULT</h1>
        <p class="text-zinc-500 text-sm font-medium tracking-wide">La app del corito café.</p>
      </div>
      
      <button id="login-btn" class="w-full bg-zinc-100 text-zinc-950 font-bold py-4 rounded-2xl text-sm active:scale-[0.96] active:bg-zinc-200 transition-all duration-150 cursor-pointer shadow-xl flex items-center justify-center gap-3">
        <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/><path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        Sign In with Google
      </button>
    </div>
  </div>

  <!-- ==================== SCREEN 2: MAIN DASHBOARD ==================== -->
  <div id="app-screen" class="hidden flex-1 flex flex-col h-full w-full">
    <!-- ✨ UPGRADED: Header is now a static block that calculates the iPhone Notch padding perfectly -->
    <header class="flex-shrink-0 border-b border-zinc-900/60 px-6 py-4 flex justify-between items-end bg-zinc-950/75 backdrop-blur-xl z-10" style="padding-top: max(var(--sat), 1rem);">
      <div class="pt-2">
        <h2 class="text-2xl font-black tracking-tight text-zinc-100 leading-none">Leaderboard</h2>
        <p id="user-greeting" class="text-[11px] text-zinc-500 font-medium mt-1"></p>
      </div>
      <button id="signout-btn" class="text-xs text-zinc-400 font-semibold border border-zinc-800/80 px-3 py-1.5 rounded-xl active:bg-zinc-900 cursor-pointer transition-all duration-100">Sign Out</button>
    </header>

    <!-- ✨ UPGRADED: This is now the ONLY part of the screen allowed to scroll -->
    <main class="flex-1 px-5 pt-4 ios-scroll flex flex-col" style="padding-bottom: max(var(--sab), 2rem);">
      <div id="cafe-list" class="space-y-4">
        <div class="flex flex-col items-center justify-center py-20 space-y-2">
          <div class="w-6 h-6 border-2 border-zinc-700 border-t-zinc-200 rounded-full animate-spin"></div>
          <p class="text-zinc-500 text-xs tracking-wide">Finding cult members...</p>
        </div>
      </div>
      
      <div class="pt-6 pb-4 mt-auto">
        <button id="open-add-modal-btn" class="w-full bg-zinc-900 border border-zinc-800 border-dashed text-zinc-400 font-bold py-4 rounded-2xl text-sm active:bg-zinc-800 transition-all cursor-pointer flex justify-center items-center gap-2">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
          Add New Location
        </button>
      </div>
    </main>
  </div>

  <!-- ==================== SCREEN 3: RATING PANEL ==================== -->
  <div id="rating-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md z-20 flex items-end justify-center">
    <!-- ✨ UPGRADED: Bottom padding ensures the button never sits under the iPhone home swipe bar -->
    <div class="bg-zinc-900/95 w-full rounded-t-[2.5rem] p-6 space-y-5 max-w-md border-t border-zinc-800/80 max-h-[92dvh] flex flex-col shadow-2xl">
      
      <!-- Static Modal Header -->
      <div class="flex-shrink-0 space-y-4">
        <div class="w-12 h-1 bg-zinc-700/60 rounded-full mx-auto -mt-2"></div>
        <div class="flex justify-between items-start">
          <div>
            <h3 id="modal-cafe-name" class="text-2xl font-black tracking-tight text-zinc-100">Cafe Name</h3>
            <p class="text-zinc-500 text-xs font-medium mt-0.5">Global Cult Summary</p>
          </div>
          <button id="close-modal-btn" class="text-zinc-400 text-xs font-bold bg-zinc-800/80 active:bg-zinc-700 px-4 py-2 rounded-full cursor-pointer transition-colors">Done</button>
        </div>
      </div>

      <!-- Scrollable Inner Content -->
      <div class="flex-1 ios-scroll hide-scrollbar space-y-5" style="padding-bottom: max(var(--sab), 1rem);">
        <div id="community-scores" class="grid grid-cols-2 gap-2.5 bg-zinc-950/80 p-4 rounded-2xl border border-zinc-800/40 shadow-inner"></div>

        <div class="space-y-2.5 pt-1">
          <h4 class="text-[11px] font-bold tracking-widest text-zinc-500 uppercase">Cult Verdicts</h4>
          <div id="council-verdicts-list" class="flex gap-3 overflow-x-auto pb-1 ios-scroll hide-scrollbar snap-x snap-mandatory"></div>
        </div>

        <div class="space-y-2.5 pt-1">
          <h4 class="text-[11px] font-bold tracking-widest text-zinc-500 uppercase">Drink Gallery</h4>
          <div class="flex gap-3 overflow-x-auto pb-1 ios-scroll hide-scrollbar snap-x snap-mandatory">
            <input type="file" id="photo-input" accept="image/*" class="hidden">
            <button id="add-photo-trigger" class="flex-shrink-0 w-24 h-24 rounded-2xl border border-dashed border-zinc-800 bg-zinc-950/30 active:bg-zinc-950/80 transition-all flex flex-col items-center justify-center gap-1 cursor-pointer snap-start text-zinc-500 hover:text-zinc-400">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 12h12m-6-6v12"/></svg>
              <span class="text-[10px] font-black tracking-wide uppercase">Upload</span>
            </button>
            <div id="photo-gallery-list" class="flex gap-3"></div>
          </div>
        </div>

        <div class="space-y-4 pt-3 border-t border-zinc-800/50">
          <h4 class="text-[11px] font-bold tracking-widest text-zinc-500 uppercase">Your Personal Assessment</h4>
          <div class="space-y-3.5" id="metric-sliders"></div>
          <button id="save-rating-btn" class="w-full bg-zinc-50 text-zinc-950 font-bold py-4 rounded-2xl text-sm active:scale-[0.97] active:bg-zinc-200 transition-all duration-150 cursor-pointer shadow-lg mt-4">
            Lock In Scores
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ==================== SCREEN 4: ADD CAFE PANEL ==================== -->
  <div id="add-modal" class="hidden fixed inset-0 bg-black/70 backdrop-blur-md z-30 flex items-end justify-center">
    <div class="bg-zinc-900/95 w-full rounded-t-[2.5rem] p-6 space-y-6 max-w-md border-t border-zinc-800/80 shadow-2xl" style="padding-bottom: max(var(--sab), 2rem);">
      <div class="w-12 h-1 bg-zinc-700/60 rounded-full mx-auto -mt-2 mb-2"></div>
      <div class="flex justify-between items-start">
        <div>
          <h3 class="text-2xl font-black tracking-tight text-zinc-100">New Location</h3>
          <p class="text-zinc-500 text-xs font-medium mt-0.5">Submit a spot to the leaderboard.</p>
        </div>
        <button id="close-add-modal-btn" class="text-zinc-400 text-xs font-bold bg-zinc-800/80 active:bg-zinc-700 px-4 py-2 rounded-full cursor-pointer transition-colors">Cancel</button>
      </div>
      <div class="space-y-4">
        <input type="text" id="new-cafe-name" placeholder="e.g. Blue Bottle Coffee" class="w-full bg-zinc-950 border border-zinc-800 rounded-2xl px-5 py-4 text-base text-zinc-100 focus:outline-none focus:border-zinc-500 transition-colors placeholder:text-zinc-700" autocomplete="off">
        <button id="submit-cafe-btn" class="w-full bg-zinc-50 text-zinc-950 font-bold py-4 rounded-2xl text-sm active:scale-[0.97] active:bg-zinc-200 transition-all duration-150 cursor-pointer shadow-lg">
          Add Location
        </button>
      </div>
    </div>
  </div>

  <!-- ==================== SCREEN 5: ACCESSIBLE PREMIUM LIGHTBOX ==================== -->
  <div id="lightbox-modal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-xl z-50 flex items-center justify-center p-4 animate-fade-in" role="dialog" aria-modal="true" aria-label="Image viewer">
    <div class="absolute inset-0" id="lightbox-backplate"></div>
    <button id="close-lightbox-btn" class="absolute top-12 right-6 w-11 h-11 bg-zinc-900/80 border border-zinc-800 text-zinc-200 font-bold rounded-full flex items-center justify-center active:scale-95 transition-all cursor-pointer z-10 shadow-lg" aria-label="Close full screen view">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
    <div class="relative max-w-full max-h-[75vh] flex flex-col items-center justify-center select-none pointer-events-none">
      <img id="lightbox-img" src="" alt="Enlarged gallery capture" class="max-w-full max-h-[70vh] rounded-2xl object-contain shadow-2xl border border-zinc-900 transition-transform duration-300 scale-95">
      <p id="lightbox-caption" class="text-center text-xs font-semibold text-zinc-400 mt-4 tracking-wide bg-zinc-900/50 border border-zinc-800/40 px-3 py-1.5 rounded-full backdrop-blur-md"></p>
    </div>
  </div>

  <!-- ==================== SYSTEM BACKEND CONNECTIONS ==================== -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, doc, setDoc, addDoc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAZ70ALdG7SIew7YfKNYN0gAivNjh9LD9E",
      authDomain: "cafecult.firebaseapp.com",
      databaseURL: "https://cafecult-default-rtdb.firebaseio.com",
      projectId: "cafecult",
      storageBucket: "cafecult.firebasestorage.app",
      messagingSenderId: "23364687514",
      appId: "1:23364687514:web:26b005e9a08be8c7dc7123",
      measurementId: "G-MCL45X19P9"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentCafeId = null;
    let allCafesData = [];

    const metrics = [
      { id: 'espresso', label: '☕ Espresso' },
      { id: 'cappuccino', label: '🥛 Cappuccino' },
      { id: 'hotMatcha', label: '🍵 Hot Matcha' },
      { id: 'icedMatcha', label: '🧊 Iced Matcha' }
    ];

    const authScreen = document.getElementById('auth-screen');
    const appScreen = document.getElementById('app-screen');
    const cafeList = document.getElementById('cafe-list');
    const loginBtn = document.getElementById('login-btn');
    const signoutBtn = document.getElementById('signout-btn');
    const ratingModal = document.getElementById('rating-modal');
    const closeModalBtn = document.getElementById('close-modal-btn');
    const saveRatingBtn = document.getElementById('save-rating-btn');
    const userGreeting = document.getElementById('user-greeting');
    
    const addModal = document.getElementById('add-modal');
    const openAddModalBtn = document.getElementById('open-add-modal-btn');
    const closeAddModalBtn = document.getElementById('close-add-modal-btn');
    const submitCafeBtn = document.getElementById('submit-cafe-btn');
    const newCafeNameInput = document.getElementById('new-cafe-name');

    const photoInput = document.getElementById('photo-input');
    const addPhotoTrigger = document.getElementById('add-photo-trigger');
    const photoGalleryList = document.getElementById('photo-gallery-list');
    const lightboxModal = document.getElementById('lightbox-modal');
    const lightboxImg = document.getElementById('lightbox-img');
    const lightboxCaption = document.getElementById('lightbox-caption');
    const closeLightboxBtn = document.getElementById('close-lightbox-btn');
    const lightboxBackplate = document.getElementById('lightbox-backplate');

    onAuthStateChanged(auth, (user) => {
      if (user) {
        authScreen.classList.add('hidden');
        appScreen.classList.remove('hidden');
        userGreeting.textContent = `Welcome, ${user.displayName || 'Cult Member'}`;
        loadAppDashboard();
      } else {
        authScreen.classList.remove('hidden');
        appScreen.classList.add('hidden');
      }
    });

    loginBtn.addEventListener('click', async () => {
      try { await signInWithPopup(auth, provider); } 
      catch (err) { alert("Login failed: " + err.message); }
    });

    signoutBtn.addEventListener('click', () => signOut(auth));

    async function loadAppDashboard() {
      try {
        const cafeSnap = await getDocs(collection(db, 'cafes'));
        allCafesData = [];

        for (let cafeDoc of cafeSnap.docs) {
          const cafeData = { id: cafeDoc.id, ...cafeDoc.data(), ratings: {} };
          const ratingsSnap = await getDocs(collection(db, `cafes/${cafeDoc.id}/ratings`));
          ratingsSnap.forEach(rDoc => {
            cafeData.ratings[rDoc.id] = rDoc.data();
          });
          allCafesData.push(cafeData);
        }
        renderCafeCards();
      } catch (err) {
        document.getElementById('cafe-list').innerHTML = `
          <div class="flex flex-col items-center justify-center py-20 px-6 text-center space-y-4">
            <div class="text-red-500 text-5xl">⚠️</div>
            <p class="text-zinc-100 font-bold text-lg">Connection Blocked</p>
            <p class="text-red-400 text-xs font-mono bg-red-500/10 p-4 rounded-xl border border-red-500/20">${err.message}</p>
          </div>
        `;
      }
    }

    function calculateAverages(ratingsObject) {
      const totals = { espresso: 0, cappuccino: 0, hotMatcha: 0, icedMatcha: 0 };
      const counts = { espresso: 0, cappuccino: 0, hotMatcha: 0, icedMatcha: 0 };
      
      Object.values(ratingsObject).forEach(userRating => {
        metrics.forEach(m => {
          if (userRating[m.id] !== undefined) {
            totals[m.id] += parseFloat(userRating[m.id]);
            counts[m.id]++;
          }
        });
      });

      const averages = {};
      let absoluteSum = 0;
      let absoluteCount = 0;

      metrics.forEach(m => {
        if (counts[m.id] > 0) {
          averages[m.id] = totals[m.id] / counts[m.id];
          absoluteSum += averages[m.id];
          absoluteCount++;
        }
      });
      
      averages._overallSortScore = absoluteCount > 0 ? (absoluteSum / absoluteCount) : 0;
      return averages;
    }

    function renderCafeCards() {
      const listContainer = document.getElementById('cafe-list');
      listContainer.innerHTML = '';
      if (allCafesData.length === 0) {
        listContainer.innerHTML = `<p class="text-zinc-500 text-sm text-center py-8">No locations verified yet.</p>`;
        return;
      }

      allCafesData.sort((a, b) => {
        const avgA = calculateAverages(a.ratings)._overallSortScore;
        const avgB = calculateAverages(b.ratings)._overallSortScore;
        return avgB - avgA;
      });

      allCafesData.forEach((cafe, index) => {
        const averages = calculateAverages(cafe.ratings);
        const card = document.createElement('div');
        
        card.className = "bg-zinc-900 border border-zinc-800/80 p-5 rounded-2xl space-y-4 active:bg-zinc-900/40 active:scale-[0.99] active:border-zinc-700/80 transition-all duration-100 cursor-pointer shadow-md";
        
        const rankColors = ["text-amber-400 bg-amber-500/10 border-amber-500/20", "text-zinc-300 bg-zinc-300/10 border-zinc-300/20", "text-amber-700 bg-amber-700/10 border-amber-700/20"];
        const rankBadgeClass = index < 3 ? rankColors[index] : "text-zinc-500 bg-zinc-800/20 border-zinc-800/30";
        const ratersCount = Object.keys(cafe.ratings).length;

        let cardHTML = `
          <div class="flex justify-between items-center">
            <div class="flex items-center gap-2.5">
              <span class="text-[10px] font-black px-2 py-0.5 border rounded-md ${rankBadgeClass}">#${index + 1}</span>
              <h3 class="text-lg font-bold text-zinc-100 tracking-tight">${cafe.name}</h3>
            </div>
            <span class="text-[10px] font-bold tracking-wider uppercase px-2 py-1 bg-zinc-950 rounded-lg text-zinc-500 border border-zinc-900">
              ${ratersCount} ${ratersCount === 1 ? 'Rating' : 'Ratings'}
            </span>
          </div>
          <div class="grid grid-cols-2 gap-2 text-xs">
        `;

        metrics.forEach(m => {
          const score = averages[m.id] ? averages[m.id].toFixed(1) : null;
          cardHTML += `
            <div class="flex justify-between items-center bg-zinc-950/40 p-3 rounded-xl border border-zinc-900/60">
              <span class="text-zinc-400 font-medium">${m.label}</span>
              <span class="font-black ${score ? 'text-amber-400' : 'text-zinc-600 italic text-[11px]'}">${score || 'Unrated'}</span>
            </div>
          `;
        });

        cardHTML += `</div>`;
        card.innerHTML = cardHTML;
        card.addEventListener('click', () => openRatingModal(cafe.id));
        listContainer.appendChild(card);
      });
    }

    async function openRatingModal(cafeId) {
      currentCafeId = cafeId;
      const cafe = allCafesData.find(c => c.id === cafeId);
      const myUid = auth.currentUser.uid;
      const myCurrentRatings = cafe.ratings[myUid] || {};

      document.getElementById('modal-cafe-name').textContent = cafe.name;

      const averages = calculateAverages(cafe.ratings);
      const communityBox = document.getElementById('community-scores');
      communityBox.innerHTML = '';
      metrics.forEach(m => {
        const score = averages[m.id] ? averages[m.id].toFixed(1) : null;
        communityBox.innerHTML += `
          <div class="text-center p-1.5 py-2 rounded-xl bg-zinc-900/40 border border-zinc-900">
            <p class="text-[9px] text-zinc-500 font-bold uppercase tracking-wider">${m.label.split(' ')[1] || m.label}</p>
            <p class="text-base font-black ${score ? 'text-zinc-100' : 'text-zinc-700 italic text-sm mt-0.5'}">${score || 'None'}</p>
          </div>
        `;
      });

      const verdictsList = document.getElementById('council-verdicts-list');
      verdictsList.innerHTML = '';
      const ratingKeys = Object.keys(cafe.ratings);
      
      if (ratingKeys.length === 0) {
        verdictsList.innerHTML = `<div class="text-xs text-zinc-600 italic px-2 py-2">No verdicts yet. Be the first to rate.</div>`;
      } else {
        ratingKeys.forEach(uid => {
          const r = cafe.ratings[uid];
          const name = r.userName || 'Member';
          const initial = name.charAt(0).toUpperCase();
          const isMe = uid === myUid;
          const nameDisplay = isMe ? 'You' : name;
          
          let metricsHtml = '';
          metrics.forEach(m => {
            const val = r[m.id];
            if (val !== undefined) {
               const icon = m.label.split(' ')[0]; 
               metricsHtml += `<div class="bg-zinc-950/60 rounded px-1.5 py-1 flex justify-between items-center border border-zinc-800/30"><span class="text-[10px]">${icon}</span><span class="text-zinc-300 font-bold">${parseFloat(val).toFixed(1)}</span></div>`;
            }
          });

          const highlightClass = isMe ? 'border-amber-500/20 bg-amber-500/5' : 'border-zinc-800/50 bg-zinc-900/60';
          const avatarClass = isMe ? 'bg-amber-500/20 text-amber-400 border-amber-500/30' : 'bg-zinc-800 text-zinc-400 border-zinc-700/50';

          verdictsList.innerHTML += `
            <div class="flex-shrink-0 w-[140px] snap-start ${highlightClass} border rounded-2xl p-3 flex flex-col gap-2.5 shadow-sm">
              <div class="flex items-center gap-2 border-b border-zinc-800/40 pb-2">
                <div class="w-6 h-6 rounded-full ${avatarClass} text-[10px] font-black flex items-center justify-center border">${initial}</div>
                <span class="text-xs font-bold ${isMe ? 'text-amber-400' : 'text-zinc-200'} truncate">${nameDisplay}</span>
              </div>
              <div class="grid grid-cols-2 gap-1.5 text-[10px] font-medium text-zinc-500">
                ${metricsHtml}
              </div>
            </div>
          `;
        });
      }

      loadCafeGallery(cafeId);

      const sliderContainer = document.getElementById('metric-sliders');
      sliderContainer.innerHTML = '';
      metrics.forEach(m => {
        const val = myCurrentRatings[m.id] !== undefined ? myCurrentRatings[m.id] : 3.0;
        
        const wrap = document.createElement('div');
        wrap.className = "space-y-1.5 bg-zinc-950/60 p-3.5 rounded-2xl border border-zinc-800/30 shadow-inner";
        wrap.innerHTML = `
          <div class="flex justify-between text-xs font-semibold tracking-wide">
            <label class="text-zinc-400">${m.label.toUpperCase()}</label>
            <span id="val-${m.id}" class="font-black text-amber-400 text-sm">${parseFloat(val).toFixed(1)}</span>
          </div>
          <input type="range" id="input-${m.id}" min="1" max="5" step="0.5" value="${val}" 
            class="w-full h-1 bg-zinc-800 rounded-lg appearance-none cursor-pointer accent-zinc-100">
        `;
        
        wrap.querySelector('input').addEventListener('input', (e) => {
          document.getElementById(`val-${m.id}`).innerText = parseFloat(e.target.value).toFixed(1);
        });

        sliderContainer.appendChild(wrap);
      });

      ratingModal.classList.remove('hidden');
    }

    async function loadCafeGallery(cafeId) {
      photoGalleryList.innerHTML = `<div class="text-zinc-600 text-[11px] animate-pulse py-10 pl-1">Loading gallery matrix...</div>`;
      try {
        const querySnap = await getDocs(query(collection(db, `cafes/${cafeId}/photos`), orderBy('createdAt', 'desc')));
        photoGalleryList.innerHTML = '';
        
        if (querySnap.empty) {
          photoGalleryList.innerHTML = `<div class="text-[10px] text-zinc-600 italic flex items-center justify-center py-10 pl-2">No shots loaded yet.</div>`;
          return;
        }

        querySnap.forEach(pDoc => {
          const data = pDoc.data();
          const photoId = pDoc.id;
          const isOwner = data.uid === auth.currentUser.uid;

          const frame = document.createElement('div');
          frame.className = "flex-shrink-0 w-24 h-24 rounded-2xl bg-zinc-950 border border-zinc-800/60 overflow-hidden active:scale-95 transition-transform duration-100 cursor-pointer snap-start shadow-md relative group";
          
          let deleteBtnHTML = '';
          if (isOwner) {
            deleteBtnHTML = `
              <button class="delete-photo-btn absolute top-1.5 right-1.5 w-6 h-6 bg-black/60 backdrop-blur-md border border-zinc-700/50 text-zinc-300 rounded-full flex items-center justify-center active:bg-red-500/90 active:text-white transition-colors z-10 shadow-sm" aria-label="Delete photo">
                <svg class="w-3.5 h-3.5 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              </button>
            `;
          }

          frame.innerHTML = `
            <img src="${data.url}" alt="Drink captured by ${data.userName}" class="w-full h-full object-cover">
            <div class="absolute bottom-0 inset-x-0 bg-gradient-to-t from-black/80 via-black/40 to-transparent p-1 px-1.5 text-center text-[8px] text-zinc-400 font-bold truncate">
              ${data.userName.split(' ')[0]}
            </div>
            ${deleteBtnHTML}
          `;
          
          frame.addEventListener('click', async (e) => {
            if (e.target.closest('.delete-photo-btn')) {
              e.stopPropagation(); 
              if (confirm("Permanently remove this photo from the gallery?")) {
                try {
                  await deleteDoc(doc(db, `cafes/${cafeId}/photos`, photoId));
                  await loadCafeGallery(cafeId);
                } catch (err) {
                  alert("Delete failed: " + err.message);
                }
              }
            } else {
              openLightbox(data.url, `Shot by ${data.userName}`);
            }
          });
          
          photoGalleryList.appendChild(frame);
        });
      } catch (err) {
        photoGalleryList.innerHTML = `<div class="text-red-500/50 text-[9px] py-10">Sync Error</div>`;
        console.error(err);
      }
    }

    addPhotoTrigger.addEventListener('click', () => photoInput.click());

    photoInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file || !currentCafeId) return;

      const originalButtonContent = addPhotoTrigger.innerHTML;
      addPhotoTrigger.disabled = true;
      addPhotoTrigger.innerHTML = `<div class="w-4 h-4 border-2 border-zinc-600 border-t-zinc-300 rounded-full animate-spin"></div>`;

      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = async function() {
          const canvas = document.createElement('canvas');
          let width = img.width;
          let height = img.height;
          const max_size = 800;

          if (width > height) {
            if (width > max_size) { height *= max_size / width; width = max_size; }
          } else {
            if (height > max_size) { width *= max_size / height; height = max_size; }
          }

          canvas.width = width;
          canvas.height = height;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);

          try {
            await addDoc(collection(db, `cafes/${currentCafeId}/photos`), {
              url: compressedBase64,
              userName: auth.currentUser.displayName || 'Cult Member',
              uid: auth.currentUser.uid, 
              createdAt: new Date().toISOString()
            });
            await loadCafeGallery(currentCafeId);
          } catch (err) {
            alert("Upload permission failed: " + err.message);
          } finally {
            addPhotoTrigger.disabled = false;
            addPhotoTrigger.innerHTML = originalButtonContent;
            photoInput.value = ''; 
          }
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });

    function openLightbox(src, captionText) {
      lightboxImg.src = src;
      lightboxCaption.textContent = captionText;
      lightboxModal.classList.remove('hidden');
      
      setTimeout(() => {
        lightboxImg.classList.remove('scale-95');
        lightboxImg.classList.add('scale-100');
      }, 50);
    }

    function closeLightbox() {
      lightboxImg.classList.remove('scale-100');
      lightboxImg.classList.add('scale-95');
      setTimeout(() => {
        lightboxModal.classList.add('hidden');
        lightboxImg.src = '';
      }, 150);
    }

    closeLightboxBtn.addEventListener('click', closeLightbox);
    lightboxBackplate.addEventListener('click', closeLightbox);
    
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && !lightboxModal.classList.contains('hidden')) {
        closeLightbox();
      }
    });

    closeModalBtn.addEventListener('click', () => ratingModal.classList.add('hidden'));

    saveRatingBtn.addEventListener('click', async () => {
      if (!currentCafeId) return;
      const myUid = auth.currentUser.uid;
      
      const payload = { 
        updatedAt: new Date().toISOString(),
        userName: auth.currentUser.displayName || 'Cult Member' 
      };

      metrics.forEach(m => {
        payload[m.id] = parseFloat(document.getElementById(`input-${m.id}`).value);
      });

      try {
        saveRatingBtn.disabled = true;
        saveRatingBtn.textContent = "Syncing Cult Matrix...";
        await setDoc(doc(db, `cafes/${currentCafeId}/ratings`, myUid), payload, { merge: true });
        ratingModal.classList.add('hidden');
        await loadAppDashboard(); 
      } catch (err) {
        alert("Failed to commit updates: " + err.message);
      } finally {
        saveRatingBtn.disabled = false;
        saveRatingBtn.textContent = "Lock In Scores";
      }
    });

    openAddModalBtn.addEventListener('click', () => {
      newCafeNameInput.value = '';
      addModal.classList.remove('hidden');
      setTimeout(() => newCafeNameInput.focus(), 100); 
    });

    closeAddModalBtn.addEventListener('click', () => addModal.classList.add('hidden'));

    submitCafeBtn.addEventListener('click', async () => {
      const name = newCafeNameInput.value.trim();
      if (!name) return; 

      try {
        submitCafeBtn.disabled = true;
        submitCafeBtn.textContent = "Adding Location...";
        await addDoc(collection(db, 'cafes'), { name: name });
        addModal.classList.add('hidden');
        await loadAppDashboard(); 
      } catch (err) {
        alert("Failed to add location. Error: " + err.message);
      } finally {
        submitCafeBtn.disabled = false;
        submitCafeBtn.textContent = "Add Location";
      }
    });
  </script>
</body>
</html>
